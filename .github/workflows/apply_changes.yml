name: Apply SEO Changes

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run only — no writes to Shopify'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

jobs:
  apply:
    name: Apply approved SEO changes to Shopify
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - run: pip install -r requirements.txt

      - name: Apply SEO changes
        env:
          SHOPIFY_CLIENT_ID: ${{ secrets.SHOPIFY_CLIENT_ID }}
          SHOPIFY_CLIENT_SECRET: ${{ secrets.SHOPIFY_CLIENT_SECRET }}
          SHOPIFY_DOMAIN: ${{ secrets.SHOPIFY_DOMAIN }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            python src/apply_changes.py --dry-run
          else
            python src/apply_changes.py
          fi

      - name: Commit results
        run: |
          git config --global user.name  "ahuru-seo-bot"
          git config --global user.email "bot@ahurucandles.co.nz"
          git add seo_tasks.json logs/
          git diff --staged --quiet || git commit -m "Apply SEO changes $(date -u +%Y-%m-%d)"
          git push
